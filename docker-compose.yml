services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lorcana
      POSTGRES_PASSWORD: lorcana
      POSTGRES_DB: lorcana_inventory
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lorcana -d lorcana_inventory"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://lorcana:lorcana@db:5432/lorcana_inventory
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./server/src:/app/src
      - ./server/prisma:/app/prisma
      - ./server/data:/app/data
    command: npm run dev

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

  # Dev-only: Vite dev server with hot reload
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://server:3001
    depends_on:
      - server
    volumes:
      - ./client/src:/app/src
      - ./client/index.html:/app/index.html
    command: npm run dev
    profiles:
      - dev

volumes:
  pgdata:
